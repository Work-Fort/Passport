name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - run: pnpm install
      - run: mise run lint
      - run: mise run sdk:all:build

  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: master
          tag_prefix: v

      - name: Check if new tag was created
        id: check_tag
        run: |
          if [ -n "$TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          VERSION=$(echo "$TAG" | sed 's/^v//')
          docker buildx build \
            --tag passport:${VERSION} \
            --tag passport:latest \
            --load \
            .

      - name: Save image
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          VERSION=$(echo "$TAG" | sed 's/^v//')
          docker save passport:${VERSION} | xz -9 > passport-${VERSION}.tar.xz
          sha256sum passport-${VERSION}.tar.xz > passport-${VERSION}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: docker-${{ needs.tag.outputs.new_tag }}
          path: |
            passport-*.tar.xz
            passport-*.sha256
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [tag, build]
    if: needs.tag.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'docker-${{ needs.tag.outputs.new_tag }}'
          merge-multiple: true

      - name: Create SHA256SUMS
        working-directory: artifacts
        run: |
          cat *.sha256 > SHA256SUMS
          rm *.sha256

      - name: Create release notes
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          CHANGELOG: ${{ needs.tag.outputs.changelog }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=$(echo "$TAG" | sed 's/^v//')
          cat > release-notes.md << EOF
          # Passport v${VERSION}

          ## What's Changed

          ${CHANGELOG}

          ## Docker Image

          \`\`\`bash
          docker load < passport-${VERSION}.tar.xz
          docker run -p 3000:3000 passport:${VERSION}
          \`\`\`

          ## Verification

          \`\`\`bash
          wget https://github.com/${REPO}/releases/download/${TAG}/SHA256SUMS
          sha256sum -c SHA256SUMS --ignore-missing
          \`\`\`

          ---

          Built automatically by [Passport CI](https://github.com/${REPO})
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: Release ${{ needs.tag.outputs.new_tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
