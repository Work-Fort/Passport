name: Release TypeScript SDK

on:
  push:
    branches: [master]
    paths:
      - 'packages/auth/**'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - run: cd packages/auth && pnpm install && pnpm run build

  tag:
    name: Create SDK Tag
    runs-on: ubuntu-latest
    needs: build
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
      should_release: ${{ steps.check_tag.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag_version
        uses: Work-Fort/github-tag-action@v6.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          release_branches: master
          tag_prefix: sdk/ts/auth-v
          paths: packages/auth/**

      - name: Check if new tag was created
        id: check_tag
        run: |
          if [ -n "$TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: jdx/mise-action@v3

      - name: Build and publish
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^sdk/ts/auth-v||')
          cd packages/auth
          pnpm install
          npm pkg set version="$VERSION"
          pnpm run build
          npm publish --provenance --access public
          pnpm pack
          mv workfort-auth-*.tgz ../../

      - name: Create release notes
        env:
          TAG: ${{ needs.tag.outputs.new_tag }}
          CHANGELOG: ${{ needs.tag.outputs.changelog }}
        run: |
          VERSION=$(echo "$TAG" | sed 's|^sdk/ts/auth-v||')
          cat > release-notes.md << EOF
          # @workfort/auth v${VERSION}

          ## What's Changed

          ${CHANGELOG}

          ## Installation

          \`\`\`bash
          pnpm add @workfort/auth@${VERSION}
          \`\`\`

          ---

          Built automatically by Passport CI
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: TS SDK ${{ needs.tag.outputs.new_tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: workfort-auth-*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
